---
name: Release Agent

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., 0.1.0). Leave empty to use Cargo.toml version."
        default: ""
        type: string

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: tellaro-pm-agent

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tellaro-pm-agent-x86_64-pc-windows-msvc.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: tellaro-pm-agent-aarch64-pc-windows-msvc.exe
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: tellaro-pm-agent-x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: tellaro-pm-agent-aarch64-unknown-linux-musl
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tellaro-pm-agent-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tellaro-pm-agent-aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux cross)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64"* ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build release binary
        working-directory: agent
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp agent/target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "agent\target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe" "${{ matrix.artifact }}"

      - name: Generate SHA256
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Extract version from tag: agent-v0.1.0 -> 0.1.0
            VERSION="${GITHUB_REF_NAME#agent-v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version' agent/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            cp "$dir"* release-assets/ 2>/dev/null || true
          done
          ls -la release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Build release notes
          cat > release-notes.md << 'EOF'
          ## Agent Binary Downloads

          | Platform | Architecture | Binary |
          |----------|-------------|--------|
          | Windows | x86_64 | `tellaro-pm-agent-x86_64-pc-windows-msvc.exe` |
          | Windows | ARM64 | `tellaro-pm-agent-aarch64-pc-windows-msvc.exe` |
          | Linux | x86_64 | `tellaro-pm-agent-x86_64-unknown-linux-musl` |
          | Linux | ARM64 | `tellaro-pm-agent-aarch64-unknown-linux-musl` |
          | macOS | x86_64 (Intel) | `tellaro-pm-agent-x86_64-apple-darwin` |
          | macOS | ARM64 (Apple Silicon) | `tellaro-pm-agent-aarch64-apple-darwin` |

          ### Quick Install

          After downloading, run the agent with a provisioning token from the Tellaro PM UI:

          ```bash
          # Linux / macOS
          chmod +x tellaro-pm-agent-*
          ./tellaro-pm-agent-* start --server https://your-server --token <PROVISIONING_TOKEN>

          # Windows (PowerShell)
          .\tellaro-pm-agent-x86_64-pc-windows-msvc.exe start --server https://your-server --token <PROVISIONING_TOKEN>
          ```

          SHA256 checksums are provided alongside each binary.
          EOF

          gh release create "agent-v${VERSION}" \
            --title "Agent v${VERSION}" \
            --notes-file release-notes.md \
            release-assets/*

  deploy-binaries:
    name: Stage Binaries for Backend
    needs: [build, release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#agent-v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy binaries to releases directory
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p "agent/releases/${VERSION}"
          for dir in artifacts/*/; do
            cp "$dir"* "agent/releases/${VERSION}/" 2>/dev/null || true
          done
          ls -la "agent/releases/${VERSION}/"

      - name: Commit and push binaries
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "agent/releases/${VERSION}/"
          git commit -m "Release agent binaries v${VERSION}

          Automated binary deployment from agent-v${VERSION} tag.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push origin main
